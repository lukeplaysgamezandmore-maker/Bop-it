
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #game { display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; min-height: 480px; user-select: none; }
  #device {
    width: 280px; height: 280px; border-radius: 50%;
    background: #2a1a6e;
    border: 6px solid #1a0d4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; margin: 1rem 0;
    transition: transform 0.08s;
  }
  #device.shake { animation: shake 0.25s; }
  @keyframes shake {
    0%,100%{transform:rotate(0)} 20%{transform:rotate(-8deg)} 40%{transform:rotate(8deg)} 60%{transform:rotate(-5deg)} 80%{transform:rotate(5deg)}
  }
  #device.flash-correct { animation: flash-good 0.2s; }
  #device.flash-wrong { animation: flash-bad 0.3s; }
  @keyframes flash-good { 0%,100%{background:#2a1a6e} 50%{background:#1a7a3a} }
  @keyframes flash-bad { 0%,100%{background:#2a1a6e} 50%{background:#8a1a1a} }

  #center-btn {
    width: 100px; height: 100px; border-radius: 50%;
    background: #e74c3c; border: 4px solid #c0392b;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: #fff; text-align: center; line-height: 1.3;
    transition: transform 0.1s, background 0.1s;
    position: relative; z-index: 2;
  }
  #center-btn:hover { transform: scale(1.05); }
  #center-btn:active { transform: scale(0.95); }
  #center-btn.lit { background: #ff6b5b; box-shadow: 0 0 18px #ff6b5b88; }

  .side-btn {
    position: absolute; width: 58px; height: 58px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.7);
    transition: transform 0.1s;
  }
  #twist-btn { background: #f39c12; border-color: #d68910; top: 18px; right: 18px; color: #7a4c00; }
  #pull-btn  { background: #27ae60; border-color: #1e8449; bottom: 18px; left: 18px; color: #0d3d1f; }

  .side-btn.lit { transform: scale(1.2); box-shadow: 0 0 14px currentColor; opacity: 1; }
  .side-btn.active-press { transform: scale(0.88); }

  #command-area {
    min-height: 72px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px;
  }
  #command {
    font-size: 36px; font-weight: 500; color: var(--color-text-primary);
    letter-spacing: 1px; text-align: center;
  }
  #command.pulse { animation: pulse 0.18s ease-out; }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }

  #key-hint { font-size: 13px; color: var(--color-text-secondary); letter-spacing: 0.5px; }

  #hud {
    display: flex; gap: 32px; margin: 0.5rem 0 1rem;
  }
  .stat { text-align: center; }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  #timer-bar-wrap { width: 260px; height: 6px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; margin: 0.25rem 0; }
  #timer-bar { height: 100%; border-radius: 4px; background: #27ae60; transition: width 0.05s linear, background 0.3s; }

  #msg { font-size: 15px; color: var(--color-text-secondary); min-height: 22px; text-align: center; }
  #start-btn {
    margin-top: 0.75rem; padding: 10px 32px; border-radius: var(--border-radius-md);
    background: #2a1a6e; color: #fff; border: none; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  #start-btn:hover { background: #3d2ba0; }
  #start-btn:active { transform: scale(0.97); }
  #start-btn:disabled { opacity: 0.4; cursor: default; }

  #key-guide {
    display: flex; gap: 16px; margin-top: 0.75rem; flex-wrap: wrap; justify-content: center;
  }
  .key-chip {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary);
  }
  .key-chip kbd {
    background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary);
    border-radius: 5px; padding: 2px 7px; font-size: 12px; font-weight: 500;
    color: var(--color-text-primary); font-family: var(--font-mono);
  }
  .key-chip span { color: var(--color-text-secondary); }
</style>

<h2 class="sr-only">Bop It game — press B to Bop, T to Twist, P to Pull</h2>

<div id="game">
  <div id="hud">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Best</div><div class="stat-val" id="best">0</div></div>
    <div class="stat"><div class="stat-label">Speed</div><div class="stat-val" id="speed-disp">1×</div></div>
  </div>

  <div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>

  <div id="command-area">
    <div id="command">BOP IT!</div>
    <div id="key-hint"></div>
  </div>

  <div id="device">
    <div class="side-btn" id="twist-btn" style="top:14px;right:14px;">TWIST</div>
    <div class="side-btn" id="pull-btn"  style="bottom:14px;left:14px;">PULL</div>
    <div id="center-btn">BOP<br>IT<br><span style="font-size:10px;opacity:0.7;">[B]</span></div>
  </div>

  <div id="msg">Press Start to play!</div>
  <button id="start-btn">Start</button>

  <div id="key-guide">
    <div class="key-chip"><kbd>B</kbd><span>Bop it</span></div>
    <div class="key-chip"><kbd>T</kbd><span>Twist it</span></div>
    <div class="key-chip"><kbd>P</kbd><span>Pull it</span></div>
  </div>
</div>

<script>
const commands = ['BOP IT!','TWIST IT!','PULL IT!'];
const keyMap = { 'b':'BOP IT!', 't':'TWIST IT!', 'p':'PULL IT!' };
const btnMap = { 'BOP IT!':'center-btn', 'TWIST IT!':'twist-btn', 'PULL IT!':'pull-btn' };
const colorMap = { 'BOP IT!':'#e74c3c', 'TWIST IT!':'#f39c12', 'PULL IT!':'#27ae60' };
const keyHints = { 'BOP IT!':'[B]', 'TWIST IT!':'[T]', 'PULL IT!':'[P]' };

let score=0, best=0, current=null, timer=null, barTimer=null;
let timeLimit=2200, playing=false, waitingStart=false;

const el = id => document.getElementById(id);

function setCommand(cmd){
  current = cmd;
  const c = el('command');
  c.textContent = cmd;
  c.className = 'pulse';
  el('key-hint').textContent = keyHints[cmd];
  setTimeout(()=>c.className='',200);

  const bId = btnMap[cmd];
  ['center-btn','twist-btn','pull-btn'].forEach(id=>{
    el(id).classList.remove('lit');
  });
  el(bId).classList.add('lit');

  startTimer();
}

function startTimer(){
  clearInterval(barTimer);
  const bar = el('timer-bar');
  const start = Date.now();
  bar.style.width='100%';
  bar.style.background = colorMap[current];
  barTimer = setInterval(()=>{
    const elapsed = Date.now()-start;
    const pct = Math.max(0,1-elapsed/timeLimit);
    bar.style.width = (pct*100)+'%';
    if(pct < 0.35) bar.style.background = '#e74c3c';
    else if(pct < 0.6) bar.style.background = '#f39c12';
    else bar.style.background = colorMap[current];
    if(pct===0){ clearInterval(barTimer); wrong(); }
  },30);

  clearTimeout(timer);
  timer = setTimeout(()=>{ if(playing) wrong(); }, timeLimit);
}

function correct(){
  score++;
  el('score').textContent=score;
  if(score>best){ best=score; el('best').textContent=best; }
  el('msg').textContent = score < 3 ? 'Nice!' : score < 8 ? 'Keep going!' : score < 15 ? 'On fire!' : 'UNSTOPPABLE!';

  timeLimit = Math.max(700, 2200 - score*70);
  el('speed-disp').textContent = (2200/timeLimit).toFixed(1)+'×';

  flashDevice('flash-correct');
  ['center-btn','twist-btn','pull-btn'].forEach(id=>el(id).classList.remove('lit'));
  clearTimeout(timer); clearInterval(barTimer);

  setTimeout(()=>{ if(playing) nextCommand(); }, 350);
}

function wrong(){
  clearTimeout(timer); clearInterval(barTimer);
  playing = false;
  el('command').textContent = 'GAME OVER';
  el('key-hint').textContent='';
  el('msg').textContent = `Score: ${score} — ${score===0?'Oops!':score<5?'Not bad!':score<10?'Great run!':'Amazing!'}`;
  ['center-btn','twist-btn','pull-btn'].forEach(id=>el(id).classList.remove('lit'));
  el('timer-bar').style.width='0%';
  flashDevice('shake');
  el('start-btn').disabled=false;
  el('start-btn').textContent = score>0?'Play Again':'Try Again';
}

function flashDevice(cls){
  const d = el('device');
  d.classList.remove('flash-correct','flash-wrong','shake');
  void d.offsetWidth;
  d.classList.add(cls);
  setTimeout(()=>d.classList.remove(cls),400);
}

function nextCommand(){
  const pool = commands.filter(c=>c!==current);
  const r = Math.random()<0.3 ? commands[Math.floor(Math.random()*commands.length)] : pool[Math.floor(Math.random()*pool.length)];
  setCommand(r);
}

function handleInput(cmd){
  if(!playing) return;
  if(cmd === current){ correct(); }
  else { wrong(); }
}

function startGame(){
  score=0; playing=true; timeLimit=2200;
  el('score').textContent='0';
  el('speed-disp').textContent='1×';
  el('start-btn').disabled=true;
  el('start-btn').textContent='Playing...';
  el('msg').textContent='Go!';
  el('timer-bar').style.width='100%';
  nextCommand();
}

document.addEventListener('keydown',e=>{
  const k = e.key.toLowerCase();
  if(keyMap[k]) handleInput(keyMap[k]);
});

el('center-btn').addEventListener('click',()=>{ handleInput('BOP IT!'); animPress('center-btn'); });
el('twist-btn').addEventListener('click',()=>{ handleInput('TWIST IT!'); animPress('twist-btn'); });
el('pull-btn').addEventListener('click',()=>{ handleInput('PULL IT!'); animPress('pull-btn'); });

function animPress(id){
  const b = el(id);
  b.classList.add('active-press');
  setTimeout(()=>b.classList.remove('active-press'),150);
}

el('start-btn').addEventListener('click',startGame);
</script>
